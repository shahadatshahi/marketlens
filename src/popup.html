<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MarketLens</title>
  <style>
    body {
      width: 320px;
      font-family: 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #e6edf3;
      margin: 0;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      margin-bottom: 16px;
    }
    .logo {
      font-size: 20px;
      font-weight: 700;
      color: #58a6ff;
    }
    .subtitle {
      font-size: 11px;
      color: #8b949e;
      margin-top: 2px;
    }
    .signal-box {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 12px;
    }
    .signal-label {
      font-size: 11px;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .signal-value {
      font-size: 28px;
      font-weight: 700;
      margin-top: 4px;
    }
    .BUY { color: #3fb950; }
    .SELL { color: #f85149; }
    .HOLD { color: #d29922; }
    .confidence {
      font-size: 13px;
      color: #8b949e;
      margin-top: 4px;
    }
    .reasoning {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 14px;
      font-size: 13px;
      line-height: 1.6;
      color: #c9d1d9;
      margin-bottom: 12px;
    }
    .analyse-btn {
      width: 100%;
      padding: 10px;
      background: #238636;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .analyse-btn:hover { background: #2ea043; }
    .status {
      font-size: 11px;
      color: #8b949e;
      text-align: center;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <div class="logo">🔍 MarketLens</div>
      <div class="subtitle">AI-powered chart analysis</div>
    </div>
  </div>

  <div class="signal-box">
    <div class="signal-label">Signal</div>
    <div class="signal-value HOLD" id="signal">--</div>
    <div class="confidence" id="confidence">Confidence: --</div>
  </div>

  <div class="reasoning" id="reasoning">
    Click "Analyse Chart" to get your AI signal.
  </div>

  <button class="analyse-btn" id="analyseBtn">🔍 Analyse Chart</button>
  <div class="status" id="status">Ready</div>

  <script src="src/popup.js"></script>
</body>
</html>
