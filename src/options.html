<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MarketLens Settings</title>
  <style>
    body {
      width: 420px;
      font-family: 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #e6edf3;
      margin: 0;
      padding: 20px;
    }
    h1 {
      font-size: 18px;
      color: #58a6ff;
      margin: 0 0 4px 0;
    }
    .subtitle {
      font-size: 12px;
      color: #8b949e;
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 12px;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    input[type="password"] {
      width: 100%;
      padding: 10px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      font-size: 13px;
      box-sizing: border-box;
    }
    input[type="password"]:focus {
      outline: none;
      border-color: #58a6ff;
    }
    .save-btn {
      margin-top: 14px;
      width: 100%;
      padding: 10px;
      background: #238636;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .save-btn:hover { background: #2ea043; }
    .status {
      font-size: 12px;
      color: #8b949e;
      margin-top: 10px;
      min-height: 16px;
    }
    .hint {
      font-size: 11px;
      color: #6e7681;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <h1>MarketLens Settings</h1>
  <div class="subtitle">Enter your Anthropic API key to enable chart analysis.</div>

  <label for="apiKey">Anthropic API Key</label>
  <input type="password" id="apiKey" placeholder="sk-ant-api03-..." autocomplete="off" />
  <div class="hint">Stored locally in your browser via chrome.storage.local. Never transmitted anywhere except the Anthropic API.</div>

  <button class="save-btn" id="saveBtn">Save</button>
  <div class="status" id="status"></div>

  <script src="options.js"></script>
</body>
</html>
